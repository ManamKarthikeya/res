<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Universal AR Pizza Viewer</title>
  
  <!-- A-Frame (3D rendering framework) -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- AR.js (Universal Marker-based AR for A-Frame) -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body style="margin: 0px; overflow: hidden;">

  <!-- User Interface Layer -->
  <div class="top-bar">
    <h1>Pepperoni Pizza</h1>
    <p>Point camera at the Hiro Marker</p>
  </div>

  <div class="bottom-ui">
    <div class="dish-info">
      <h2>Classic Pepperoni Pizza</h2>
      <div class="details">
        <span>🍕 12 Inch</span>
        <span>👥 Serves 2</span>
      </div>
      <div class="price">₹349</div>
      <p class="instruction">Keep the square marker in your camera view to see the exact portion size!</p>
    </div>
  </div>

  <!-- AR Scene Layer -->
  <a-scene 
    embedded 
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best; detectionMode: mono;"
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; precision: mediump;">
    
    <!-- Load 3D Model -->
    <a-assets>
      <a-asset-item id="pizzaModel" src="restaurant_scene.glb"></a-asset-item>
    </a-assets>

    <!-- AR Marker: Using standard Hiro marker as the anchor point -->
    <a-marker preset="hiro">
      <!-- 
        The 3D model is anchored to the marker here.
        Scale might need adjustment depending on how you exported from Blender.
        Scale="1 1 1" means 1 Unit = 1 Meter roughly, relative to the marker.
      -->
      <a-entity 
        gltf-model="#pizzaModel" 
        scale="1 1 1" 
        position="0 0 0" 
        rotation="0 0 0">
      </a-entity>
    </a-marker>

    <!-- Camera -->
    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
