<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Universal AR Pizza Viewer</title>
  
  <!-- A-Frame (3D rendering framework) -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Live Camera Feed Background -->
  <video id="webcam" autoplay muted playsinline></video>

  <!-- User Interface Layer -->
  <div class="top-bar">
    <h1>Pepperoni Pizza</h1>
    <p id="instruction-text">Look around and TAP to place on table</p>
  </div>

  <div class="bottom-ui">
    <div class="dish-info">
      <h2>Classic Pepperoni Pizza</h2>
      <div class="details">
        <span>🍕 12 Inch</span>
        <span>👥 Serves 2</span>
      </div>
      <div class="price">₹349</div>
    </div>
  </div>

  <!-- Transparent 3D Scene Layer -->
  <a-scene 
    embedded 
    vr-mode-ui="enabled: false"
    background="transparent: true">
    
    <a-assets>
      <a-asset-item id="pizzaModel" src="try.glb"></a-asset-item>
    </a-assets>

    <!-- Gyroscope-controlled Camera -->
    <a-entity id="camera" camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: false; mouseEnabled: false;"></a-entity>

    <!-- The 3D Pizza (Hidden until tapped) -->
    <a-entity 
      id="pizza" 
      gltf-model="#pizzaModel" 
      visible="false"
      scale="1 1 1" 
      position="0 0 0">
    </a-entity>

  </a-scene>

  <script src="script.js"></script>
</body>
</html>
