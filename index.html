<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizza Immersive Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="top-bar">
    <h1>Pepperoni Pizza</h1>
    <p>3D & AR Preview</p>
  </div>

  <model-viewer
    id="viewer"
    src="restaurant_scene.glb"
    camera-controls
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    alt="A 3D model of a Pepperoni Pizza">
    
    <button slot="ar-button" class="ar-button">
      View on your table
    </button>
  </model-viewer>

  <div class="bottom-ui">
    <div class="dish-info">
      <h2>Classic Pepperoni Pizza</h2>
      <div class="details">
        <span>🍕 12 Inch</span>
        <span>👥 Serves 2</span>
      </div>
      <div class="price">₹349</div>
      <p class="instruction">Tap "View on your table" to see the exact real-world size!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
